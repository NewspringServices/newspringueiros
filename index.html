<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Frase Engraçada</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            text-align: center;
        }

        /* Logo em cima */
        .logo {
            max-width: 200px;
            margin-bottom: 30px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            padding: 15px 25px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            background-color: #4CAF50;
            color: white;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        #frase {
            margin-top: 25px;
            font-size: 32px;
            color: #333;
            font-weight: bold;
        }

        #imagemFrase {
            max-width: 300px;
            margin-top: 20px;
            display: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo Newspring" class="logo">
    <button onclick="mostrarFrase()">Modo: Ativar Newspringueiros!</button>
    <p id="frase"></p>
    <img id="imagemFrase" src="" alt="Imagem engraçada">
</div>

<script>
function mostrarFrase() {
    // Define a frase
    document.getElementById("frase").innerText =
    "Se a Segunda te mandar abaixo… aproveita para fazer agachamentos! 🤸‍♂️😂";

    // Mostra a imagem correspondente
    const img = document.getElementById("imagemFrase");
    img.src = "flork.png"; // substitui pelo caminho da tua imagem
    img.style.display = "block";
}
</script>

</body>
</html>
