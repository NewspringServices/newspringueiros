<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            text-align: center;
        }

        /* Logo em cima */
        .logo {
            max-width: 200px; /* ajuste conforme necessário */
            margin-bottom: 30px; /* espaço entre logo e botão */
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            padding: 15px 25px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            background-color: #4CAF50; /* verde da empresa */
            color: white;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        #frase {
            margin-top: 25px;
            font-size: 32px; /* tamanho maior da letra */
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo Newspring" class="logo">
    <button onclick="mostrarFrase()">Modo: Ativar Newspringueiros!</button>
    <p id="frase"></p>
</div>

<script>
function mostrarFrase() {
    document.getElementById("frase").innerText =
    "Começa o dia com um sorriso — é mais barato que terapia 🤫✨️";
}
</script>

</body>
</html>
